services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - mysql-network
    depends_on:
      - mysql
      - gateway-mock

  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mysql-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: laravel-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-betalent_api}
      MYSQL_USER: ${MYSQL_USER:-admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-admin}
    volumes:
      - ./docker/mysql:/var/lib/mysql
    ports:
      - "3313:3306"
    restart: unless-stopped
    networks:
      - mysql-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  gateway-mock:
    image: matheusprotzen/gateways-mock
    container_name: gateway-mock
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - REMOVE_AUTH=false
    networks:
      - mysql-network

  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - mysql-network
    depends_on:
      - mysql

networks:
  mysql-network:
    driver: bridge
